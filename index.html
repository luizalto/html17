function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++) id += chars.charAt(Math.floor(Math.random() * chars.length))
  return id
}
function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){ id = gerarId(); localStorage.setItem('user_id', id) }
  return id
}

async function fetchGeoFromAPI(url) {
  const resp = await fetch(url, { signal: AbortSignal.timeout(2000) })
  if (!resp.ok) throw new Error("bad response")
  return resp.json()
}

function extrairGeo(d) {
  const rc = (d.region_code || "").replace(/[^A-Za-z]/g, "").toUpperCase()
  const state = rc.length === 2 ? rc : "ZZ"
  const cityRaw = (d.city || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z]/g, "")
    .toUpperCase()
  const city = cityRaw.slice(0, 6) || "ZZ"
  return { state, city, city_full: d.city || "", state_full: d.region || "" }
}

const GEO_CACHE_KEY = "geo_cache"
const GEO_CACHE_TTL = 30 * 60 * 1000 // 30 minutos

async function medirGeo() {
  // 1. Tentar cache válido
  try {
    const cached = JSON.parse(sessionStorage.getItem(GEO_CACHE_KEY))
    if (cached && cached.expires > Date.now()) {
      return cached.data
    }
  } catch {}

  // 2. Lista de APIs em ordem de preferência
  const apis = [
    () => fetchGeoFromAPI("https://ipapi.co/json/"),
    () => fetchGeoFromAPI("https://ipwho.is/"),
    () => fetchGeoFromAPI("https://freeipapi.com/api/json")
  ]

  let data = null
  for (const apiFn of apis) {
    try {
      const json = await apiFn()
      data = extrairGeo(json)
      if (data.state !== "ZZ" || data.city !== "ZZ") break // sucesso
    } catch {}
  }

  // 3. Se todas falharam, tenta reutilizar cache expirado
  if (!data) {
    try {
      const cached = JSON.parse(sessionStorage.getItem(GEO_CACHE_KEY))
      if (cached && cached.data) {
        data = cached.data
      }
    } catch {}
  }

  // 4. Fallback final
  if (!data) {
    data = { state: "ZZ", city: "ZZ", city_full: "", state_full: "" }
  }

  // 5. Atualiza cache (mesmo que seja ZZ, para evitar requisições repetidas imediatas)
  try {
    sessionStorage.setItem(GEO_CACHE_KEY, JSON.stringify({
      data,
      expires: Date.now() + GEO_CACHE_TTL
    }))
  } catch {}

  return data
}

function classificarVel(mbps){
  if(mbps <= 0.5) return 1

  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10
  return 14
}

async function medirBateria(){

}

// =========================================================
// MOVIMENTO
// =========================================================
function medirMovimento(){
  return new Promise(resolve => {
    let det = false
    function h(e){
      const a = e.accelerationIncludingGravity
      if(!a) return
      if(Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0) > 15) det = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", h)
      setTimeout(() => { window.removeEventListener("devicemotion", h); resolve(det?"M1":"M0") }, 120)
    } else resolve("M0")
  })
}

// =========================================================

function medirRAM(){
  const ram = navigator.deviceMemory || 4

  if(ram <= 8) return "R3"
  return "R4"
}

// =========================================================
// WEBRTC
// =========================================================
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set(); let enc = false
      function encerrar(){
        if(enc) return; enc = true; try{pc.close()}catch{}
        let tag = "RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip))                           { tag="RC"; break }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip))     { tag="RV"; break }
          if(/^192\.168\./.test(ip))                       tag="RH"
        }
        resolve(tag)
      }
      pc.onicecandidate = e => {
        if(!e||!e.candidate){ encerrar(); return }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }
      pc.createDataChannel('')
      pc.createOffer().then(o=>pc.setLocalDescription(o)).catch(()=>resolve("RU"))
      setTimeout(()=>encerrar(), 850)
    } catch { resolve("RU") }
  })
}

    state_full  : geo.state_full,
    city        : cityTag,
    city_full   : geo.city_full,
    uc_completo : finalUC,
    min_dezena  : minDezena,
    min_unidade : minUnidade,
    seg_metade  : segMetade,
    hora_par    : horaPar,
    dia_semana  : diaSemana,
    dia_par     : diaPar,
    periodo,
    b_par       : bPar,
    n_par       : nPar,
    fbp_flag    : FBP,
    fbc_flag    : FBC
  }
  if(ENABLE_PARIDADE && paridadeTag) payload.paridade = paridadeTag
  fetch(SHEETS_URL, {
    method  : "POST",
    mode    : "no-cors",
    headers : { "Content-Type": "application/json" },
    body    : JSON.stringify(payload)
  }).catch(()=>{})
} catch(e){}

// =========================================================
// REDIRECT
// =========================================================
const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`
setTimeout(() => { window.location.href = url }, 400)

})();
</script>
